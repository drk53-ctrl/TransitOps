<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        TransitOps
        {% endblock %}
    </title>

    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">

</head>

<body>

    <div class="layout">

        <aside class="sidebar">

            <h2>
                TransitOps
            </h2>

            <nav>

                <a href="/dashboard">
                    Dashboard
                </a>

                <a href="/vehicles">
                    Vehicles
                </a>

                <a href="/drivers">
                    Drivers
                </a>

                <a href="/trips">
                    Trips
                </a>

                <a href="/maintenance">
                    Maintenance
                </a>

                <a href="/fuel">
                    Fuel
                </a>

                <a href="/expenses">
                    Expenses
                </a>

                <a href="/reports">
                    Reports
                </a>

                <a href="/profile">
                    Profile
                </a>

            </nav>

        </aside>


        <main class="content">

            <header class="navbar">

                <h3>
                    Fleet Management System
                </h3>

                <a href="/logout">
                    Logout
                </a>

            </header>


            <section>

                {% block content %}

                {% endblock %}

            </section>


        </main>

    </div>


    <script src="/static/js/main.js"></script>

</body>

</html>
