{% extends "base.html" %}

{% block title %}
Add Expense - TransitOps
{% endblock %}


{% block content %}


<h1>
    Add Expense
</h1>



<form method="post" action="/expenses/add">


    <label>
        Category
    </label>


    <input
        type="text"
        name="category"
        required
    >



    <label>
        Description
    </label>


    <textarea
        name="description">
    </textarea>



    <label>
        Amount
    </label>


    <input
        type="number"
        step="0.01"
        name="amount"
        required
    >



    <label>
        Date
    </label>


    <input
        type="date"
        name="x_date"
    >



    <button type="submit">
        Save Expense
    </button>


</form>


{% endblock %}
