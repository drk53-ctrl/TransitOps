{% extends "auth_base.html" %}


{% block title %}
Login - TransitOps
{% endblock %}



{% block content %}


<h1>
Login
</h1>


<form action="/auth/login" method="post">


<input
type="email"
name="username"
placeholder="Email"
required
>


<input
type="password"
name="password"
placeholder="Password"
required
>


<button type="submit">
Login
</button>


</form>


<a href="/signup">
Create account
</a>


{% endblock %}
